<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sim2600-CS</title>
  <link rel="preload" id="webassembly" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script type="importmap"></script>
  <script type='module' src="main#[.{fingerprint}].js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: lab(16.332899 -0.639722 -10.8333);
      --accent: #e8522a;
      --text: #c8c8c8;
      --dim: #666;
      --font: "Press Start 2P", 'Courier New', monospace;
      --primary: oklch(0.78 0.16 65);
      --secondary: lab(9.42785% -.533104 -7.25476);
      --text-sm: 0.875rem;
      --card: lab(4.36941% -.237331 -5.91022);
      --tw-ease: cubic-bezier(.4, 0, .2, 1);
      --default-transition-timing-function: cubic-bezier(.4, 0, .2, 1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Title bar */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 44px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: var(--text-sm);
      font-weight: bold;
      letter-spacing: 0.15em;
      color: var(--primary);
      text-transform: uppercase;
    }

    header a {
      color: var(--dim);
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    header a:hover { color: var(--text); }

    /* Main area */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Drop zone */
    #drop-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 640px;
      height: 480px;
      border: 2px dashed var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      user-select: none;
      background-color: var(--card);

      transition-duration: 0.2s;
      transition-property: all;
      transition-timing-function: var(--tw-ease, var(--default-transition-timing-function));
    }

    #drop-zone:hover {
      border-color: var(--primary);
    }

    #drop-zone.drag-over {
      border-color: var(--accent);
      color: var(--accent);
    }

    #drop-icon {
      background-color: var(--secondary);
      padding: 16px;
      border-radius: 50%;
    }

    #drop-zone svg { opacity: 0.4; }
    #drop-zone.drag-over svg { opacity: 1; }

    #drop-zone input { display: none; }

    /* Canvas */
    #screen {
      display: none;
      image-rendering: pixelated;
      max-width: 100%;
      max-height: 100%;
    }

    /* Status bar */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 0 16px;
      height: 28px;
      background: var(--surface);
      border-top: 1px solid color-mix(in oklab, var(--primary) 30%, transparent);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--dim);
      flex-shrink: 0;
    }

    #status-bar-left, #status-bar-right { display: flex; align-items: center; gap: 12px; }

    .status-item { display: flex; align-items: center; gap: 6px; }

    .indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
    }

    .indicator.active { background: var(--primary); }
  </style>
</head>

<body>

  <header>
    <h1>Sim2600-CS</h1>
    <a href="https://github.com/tgjones/Sim2600-CS" target="_blank" rel="noopener" title="GitHub">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482
          0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.154-1.11-1.462-1.11-1.462
          -.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832
          .092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683
          -.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0
          0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028
          1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012
          2.415-.012 2.743 0 .267.18.579.688.481C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
      </svg>
    </a>
  </header>

  <main>
    <div id="drop-zone">
      <div id="drop-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-upload h-8 w-8 transition-colors duration-200 text-muted-foreground" aria-hidden="true"><path d="M12 3v12"></path><path d="m17 8-5-5-5 5"></path><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path></svg>
      </div>
      <span>Drop Atari 2600 ROM here</span>
      <span style="font-size:0.7rem; opacity:0.5">or click to browse</span>
      <input type="file" id="rom-input" accept=".bin,.a26,.rom">
    </div>
    <canvas id="screen"></canvas>
  </main>

  <footer>
    <div id="status-bar-left">
      <span class="status-item">Half Cycles: <span id="half-cycles">0</span></span>
    </div>
    <span class="status-item" id="last-frame-time"></span>
    <span class="status-item" id="ms-per-half-cycle"></span>
    <div id="status-bar-right">
      <span class="status-item"><span class="indicator" id="vsync-led"></span> VSYNC</span>
      <span class="status-item"><span class="indicator" id="vblank-led"></span> VBLANK</span>
    </div>
  </footer>

</body>

</html>
